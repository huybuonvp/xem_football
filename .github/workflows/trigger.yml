name: Tín hiệu kích hoạt từ xem_football

on:
  push:
    paths:
      - 'All_CHANNEL.m3u' # Chỉ kích hoạt đúng khi file này có thay đổi thực sự

jobs:
  ping-xembongda:
    runs-on: ubuntu-latest
    steps:
      - name: Bắn lệnh kích hoạt trực tiếp sang xembongda
        run: |
          # Dùng lệnh curl bắn thẳng vào API của GitHub để ép xembongda chạy tức thì
          # GITHUB_TOKEN có sẵn của hệ thống sẽ lo phần bảo mật, bypass hoàn toàn lỗi 403
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/xembongda/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
          
          echo "[SUCCESS] Đã ép kho xembongda kích hoạt check_live ngay lập tức!"
