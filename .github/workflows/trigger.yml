name: Tín hiệu kích hoạt từ xem_football

on:
  push:
    paths:
      - 'All_CHANNEL.m3u' # Chỉ kích hoạt khi file này có thay đổi thực sự

jobs:
  ping-xembongda:
    runs-on: ubuntu-latest
    steps:
      - name: Bắn lệnh kích hoạt trực tiếp sang xembongda
        run: |
          # Sử dụng MY_TRIGGER_TOKEN (PAT) đã cấu hình trong Settings -> Secrets để bypass lỗi 403
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MY_TRIGGER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/xembongda/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
          
          echo "[SUCCESS] Đã gửi tín hiệu kích hoạt sang kho xembongda thành công!"
